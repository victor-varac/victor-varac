<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" width="1200" height="430" role="img" aria-label="Víctor Varac — consola VARAC">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#D7DFD9" stroke-width="1" opacity="0.6"/>
    </pattern>
    <clipPath id="win"><rect x="40" y="34" width="1120" height="362" rx="12"/></clipPath>
    <clipPath id="type">
      <rect x="87.2" y="92" width="0" height="24">
        <animate attributeName="width" calcMode="discrete" begin="0.5s" dur="2.2s" fill="freeze"
          values="0;19.2;38.4;57.6;76.8;96;115.2;134.4;153.6;172.8;192;211.2;230.4;249.6;268.8;288;307.2;326.4;345.6;364.8;384;403.2;422.4"/>
      </rect>
    </clipPath>
    <clipPath id="rz"><rect x="840" y="78" width="314" height="312"/></clipPath>
  </defs>

  <!-- suelo -->
  <rect x="0" y="0" width="1200" height="430" fill="#F6F8F6"/>
  <rect x="0" y="0" width="1200" height="430" fill="url(#grid)"/>

  <!-- marcas de registro en esquinas -->
  <g stroke="#5A6B5F" stroke-width="1" opacity="0.3">
    <path d="M20 12V28M12 20H28"/>
    <path d="M1180 12V28M1172 20H1188"/>
    <path d="M20 402V418M12 410H28"/>
    <path d="M1180 402V418M1172 410H1188"/>
  </g>

  <!-- ventana de terminal -->
  <rect x="40" y="34" width="1120" height="362" rx="12" fill="#FFFFFF" stroke="#D7DFD9" stroke-width="1"/>
  <g clip-path="url(#win)">
    <rect x="40" y="34" width="1120" height="38" fill="#F6F8F6"/>
    <line x1="40" y1="72" x2="1160" y2="72" stroke="#D7DFD9" stroke-width="1"/>
  </g>

  <!-- barra de título -->
  <circle cx="62" cy="53" r="5.5" fill="#5A6B5F"/>
  <circle cx="82" cy="53" r="5.5" fill="#1A7F37"/>
  <circle cx="102" cy="53" r="5.5" fill="#9A6700"/>
  <text x="122" y="57.5" font-family="'Courier New', monospace" font-size="13" fill="#5A6B5F">varac · sesión de agente</text>
  <circle cx="1008" cy="52.5" r="3" fill="#1A7F37"/>
  <text x="1132" y="57" text-anchor="end" font-family="'Courier New', monospace" font-size="10.5" letter-spacing="2" fill="#5A6B5F">SESIÓN ACTIVA</text>

  <!-- zona geoespacial derecha -->
  <g clip-path="url(#rz)">
    <rect x="840" y="78" width="314" height="312" fill="url(#grid)" opacity="0.9"/>
    <text x="896" y="118" font-family="'Courier New', monospace" font-size="10" letter-spacing="1" fill="#9A6700" opacity="0.9">PARCELA 07 · 4.2 HA</text>
    <path d="M920 150 L1030 128 L1108 186 L1082 286 L968 312 L896 238 Z"
      fill="#1A7F37" fill-opacity="0.05" stroke="#1A7F37" stroke-width="1.5" stroke-linejoin="round"
      pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
      <animate attributeName="stroke-dashoffset" values="1;0" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1" begin="0.7s" dur="2.2s" fill="freeze"/>
    </path>
    <path d="M1010 214 L1078 200 L1102 250 L1046 286 L1000 262 Z"
      fill="#9A6700" fill-opacity="0.04" stroke="#9A6700" stroke-width="1.25" stroke-linejoin="round"
      pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
      <animate attributeName="stroke-dashoffset" values="1;0" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1" begin="1.5s" dur="1.6s" fill="freeze"/>
    </path>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.9" begin="2.9s" dur="0.3s" fill="freeze"/>
      <circle cx="920" cy="150" r="2.5" fill="#1A7F37"/>
      <circle cx="1108" cy="186" r="2.5" fill="#1A7F37"/>
      <circle cx="968" cy="312" r="2.5" fill="#1A7F37"/>
      <circle cx="1102" cy="250" r="2.5" fill="#9A6700"/>
    </g>
    <!-- crosshair -->
    <g stroke="#5A6B5F" stroke-width="1" opacity="0.65" fill="none">
      <path d="M918 232H938M958 232H978M948 202V222M948 242V262"/>
      <circle cx="948" cy="232" r="9"/>
    </g>
    <circle cx="948" cy="232" r="1.5" fill="#9A6700"/>
  </g>
  <text x="1128" y="382" text-anchor="end" font-family="'Courier New', monospace" font-size="11" letter-spacing="1" fill="#5A6B5F">19°02' N · 98°12' W — PUEBLA, MX</text>

  <!-- línea de prompt -->
  <text x="68" y="108" font-family="'Courier New', monospace" font-size="16" fill="#1A7F37">$</text>
  <g clip-path="url(#type)">
    <text x="87.2" y="108" font-family="'Courier New', monospace" font-size="16" fill="#16241C" xml:space="preserve">consulta "¿riesgo hídrico en este polígono?"</text>
  </g>
  <rect x="87.2" y="93" width="8.5" height="18" fill="#1A7F37">
    <animate attributeName="x" calcMode="discrete" begin="0.5s" dur="2.2s" fill="freeze"
      values="87.2;106.4;125.6;144.8;164;183.2;202.4;221.6;240.8;260;279.2;298.4;317.6;336.8;356;375.2;394.4;413.6;432.8;452;471.2;490.4;509.6"/>
    <animate attributeName="opacity" calcMode="discrete" values="1;0" dur="1.06s" repeatCount="indefinite"/>
  </rect>

  <!-- respuesta -->
  <text x="68" y="140" font-family="'Courier New', monospace" font-size="15" xml:space="preserve" opacity="0"><animate attributeName="opacity" values="0;1" begin="2.85s" dur="0.25s" fill="freeze"/><tspan fill="#1A7F37" font-weight="bold">✓</tspan><tspan fill="#16241C"> mapa generado </tspan><tspan fill="#5A6B5F">·</tspan><tspan fill="#9A6700"> 3 capas </tspan><tspan fill="#5A6B5F">·</tspan><tspan fill="#1A7F37"> consulta trazable</tspan></text>

  <line x1="68" y1="164" x2="790" y2="164" stroke="#D7DFD9" stroke-width="1"/>

  <!-- identidad -->
  <text x="68" y="226" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="0.5" fill="#16241C">VÍCTOR VARAC</text>
  <text x="68" y="258" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#5A6B5F">INGENIERO AMBIENTAL · DESARROLLADOR DE IA · CEO DE VARAC</text>
  <text x="68" y="288" font-family="Helvetica, Arial, sans-serif" font-size="16.5" font-style="italic" fill="#16241C" opacity="0.72">Where environmental auditing meets AI-native engineering.</text>

  <!-- badges -->
  <g font-family="'Courier New', monospace" font-size="12" letter-spacing="2.4">
    <rect x="68" y="312" width="136" height="32" rx="16" fill="#F6F8F6" stroke="#D7DFD9" stroke-width="1"/>
    <circle cx="86" cy="328" r="3.5" fill="#1A7F37">
      <animate attributeName="r" values="3.5;5.5;3.5" keyTimes="0;0.4;1" begin="1s" dur="0.7s" repeatCount="1" fill="freeze"/>
    </circle>
    <circle cx="86" cy="328" r="4" fill="none" stroke="#1A7F37" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" begin="1s" dur="0.9s" repeatCount="1"/>
      <animate attributeName="r" values="4;14" begin="1s" dur="0.9s" repeatCount="1"/>
    </circle>
    <text x="98" y="332.5" fill="#16241C">AI-NATIVE</text>

    <rect x="220" y="312" width="240" height="32" rx="16" fill="#F6F8F6" stroke="#D7DFD9" stroke-width="1"/>
    <circle cx="238" cy="328" r="3.5" fill="#1A7F37">
      <animate attributeName="r" values="3.5;5.5;3.5" keyTimes="0;0.4;1" begin="1.15s" dur="0.7s" repeatCount="1" fill="freeze"/>
    </circle>
    <circle cx="238" cy="328" r="4" fill="none" stroke="#1A7F37" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" begin="1.15s" dur="0.9s" repeatCount="1"/>
      <animate attributeName="r" values="4;14" begin="1.15s" dur="0.9s" repeatCount="1"/>
    </circle>
    <text x="250" y="332.5" fill="#16241C">AUDITABLE POR DISEÑO</text>

    <rect x="476" y="312" width="222" height="32" rx="16" fill="#F6F8F6" stroke="#D7DFD9" stroke-width="1"/>
    <circle cx="494" cy="328" r="3.5" fill="#1A7F37">
      <animate attributeName="r" values="3.5;5.5;3.5" keyTimes="0;0.4;1" begin="1.3s" dur="0.7s" repeatCount="1" fill="freeze"/>
    </circle>
    <circle cx="494" cy="328" r="4" fill="none" stroke="#1A7F37" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" begin="1.3s" dur="0.9s" repeatCount="1"/>
      <animate attributeName="r" values="4;14" begin="1.3s" dur="0.9s" repeatCount="1"/>
    </circle>
    <text x="506" y="332.5" fill="#16241C">AGENTES END-TO-END</text>
  </g>
</svg>
